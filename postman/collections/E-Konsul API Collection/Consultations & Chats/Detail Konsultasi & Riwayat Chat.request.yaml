$kind: http-request
url: "{{base_url}}/api/consultations/1"
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{auth_token}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response success is true", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.success).to.be.true;
      });
      pm.test("Response has booking and messages", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.booking).to.be.an("object");
          pm.expect(jsonData.messages).to.be.an("array");
      });
    language: text/javascript
order: 1000
