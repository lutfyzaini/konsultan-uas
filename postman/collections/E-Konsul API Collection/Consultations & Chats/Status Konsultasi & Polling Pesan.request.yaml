$kind: http-request
url: "{{base_url}}/api/consultations/1/status?last_id=0"
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{auth_token}}
queryParams:
  last_id: "0"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response success is true", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.success).to.be.true;
      });
      pm.test("Response status and new_messages exist", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.status).to.exist;
          pm.expect(jsonData.new_messages).to.be.an("array");
      });
    language: text/javascript
order: 3000
